name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  clippy:
    name: Clippy (warnings denied)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - name: cargo clippy --all-targets --all-features -- -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

  docs:
    name: Docs build (warnings denied)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings -D rustdoc::broken-intra-doc-links
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: docs
      - name: cargo doc --no-deps --all-features
        run: cargo doc --no-deps --all-features

  test:
    name: Test suite
    runs-on: ubuntu-latest
    # The suite links 200+ separate test binaries. On the 7 GB ubuntu-latest
    # runner, linking them all with full debuginfo can exhaust memory and crash
    # `ld` with SIGBUS ("ld terminated with signal 7 [Bus error]"). Dropping
    # debuginfo for the test profile cuts linker memory + artifact size sharply
    # (local dev keeps full debuginfo); cap build jobs so peak link concurrency
    # stays bounded.
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: test
      # The differential / cross-engine tests use the sqlite3 CLI as the oracle.
      # The distro's apt sqlite3 is too old for some features graphitesql tracks
      # (ISO-week strftime %G/%V/%u, `_` numeric separators, %f rounding), which
      # would make correct graphitesql output look "divergent". Pin a known
      # recent sqlite3 — the version local development validates against — so the
      # oracle matches graphitesql's target behavior.
      - name: Install sqlite3 (pinned)
        run: |
          set -euo pipefail
          ver=3500400  # 3.50.4
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://www.sqlite.org/2025/sqlite-tools-linux-x64-${ver}.zip" -o /tmp/sqlite-tools.zip
          unzip -o -j /tmp/sqlite-tools.zip sqlite3 -d "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/sqlite3"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Show sqlite3 version
        run: sqlite3 --version
      - name: cargo test --all-features
        run: cargo test --all-features --jobs 2

  no_std:
    name: no_std build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: no_std
      - name: cargo build --no-default-features
        run: cargo build --no-default-features

  wasm:
    name: wasm build (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      # The zero-dependency `no_std`+alloc core (with the always-available in-memory
      # VFS) compiles to WebAssembly, so graphite can run an in-memory database in a
      # browser/wasm host today (ROADMAP D6-1). This guards that capability against
      # regressions; the persistent async VFS (D6-2) is a separate, opt-in step.
      - name: cargo build --no-default-features --target wasm32-unknown-unknown
        run: cargo build --no-default-features --target wasm32-unknown-unknown

  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@1.89
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - name: cargo build (default + no_std) on MSRV
        run: |
          cargo build --all-features
          cargo build --no-default-features
